version: 2

project_name: modelgo-cli

before:
  hooks:
    - go mod tidy

builds:
  - id: modelgo-cli
    main: ./cmd/modelgo-cli
    binary: modelgo-cli
    ldflags:
      - -s -w -X github.com/modelgo/modelgo-cli/internal/version.Version=v{{.Version}}
    env:
      - CGO_ENABLED=0
    goos: [darwin, linux, windows]
    goarch: [amd64, arm64]

archives:
  - id: modelgo-cli
    name_template: 'modelgo-cli-{{.Version}}-{{.Os}}-{{.Arch}}'
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - LICENSE
      - README.md

checksum:
  name_template: checksums.txt
  algorithm: sha256

release:
  github:
    owner: modelgo
    name: modelgo-cli
  draft: false
  prerelease: auto

changelog:
  use: github
  sort: asc
