name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    name: GoReleaser + npm publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
          scope: "@model-go"

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Sync checksums.txt back to main
        run: |
          cp dist/checksums.txt checksums.txt
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add checksums.txt
          # `git diff --quiet` does not look at the index alone; use
          # `git diff --cached --quiet` so this works on first release
          # (when checksums.txt is being introduced as a new tracked file).
          if ! git diff --cached --quiet -- checksums.txt; then
            git commit -m "chore: update checksums.txt for ${GITHUB_REF_NAME}"
            git push origin HEAD:main
          fi

      - name: Sync package.json version to tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          npm version "$VERSION" --no-git-tag-version --allow-same-version

      - name: Publish to npm
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          # Pre-release (v0.1.2-rc.1, v0.1.2-beta.1, etc.) goes to a named
          # dist-tag derived from the suffix, so stable @latest users are
          # unaffected. Stable versions (v0.1.2) use the default @latest.
          if [[ "$VERSION" == *-* ]]; then
            DIST_TAG=$(echo "$VERSION" | sed -E 's/.*-([a-z]+).*/\1/')
            echo "Pre-release: publishing @model-go/cli@$VERSION --tag $DIST_TAG"
            npm publish --access public --tag "$DIST_TAG"
          else
            echo "Stable: publishing @model-go/cli@$VERSION --tag latest"
            npm publish --access public
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
